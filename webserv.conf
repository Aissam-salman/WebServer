# webserv.conf — sandbox starting config
# Invocation: ./WebServ webserv.conf
# Syntax is your own to define; this follows the NGINX-style convention.
# Reference: ../../library/cpp/webserv/19_CONFIGURATION.md

server {
    listen 0.0.0.0:8090;
    listen 0.0.0.0:8110;
    server_name localhost;

    client_max_body_size 10M;

    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/5xx.html;

    location / {
        root      ./www;
        index     index.html;
        methods   GET;
        autoindex off;
    }

    location /files {
        root      ./www/files;
        methods   GET;
        autoindex on;
    }

    location /uploads {
        root        ./www/uploads;
        methods     GET POST DELETE;
        upload_dir  ./www/uploads;
        client_max_body_size 50M;
    }

    location /cgi-bin {
        root    ./www/cgi-bin;
        methods GET POST;
        cgi     .py  /usr/bin/python3;
        cgi     .php  /usr/bin/php-cgi;
    }

    location /old {
        return 301 /new;
    }
}

