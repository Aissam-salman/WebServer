# webserv_demo.conf — config for the interactive demo site
# Invocation: ./WebServ webserv_demo.conf
# Same as webserv.conf, but the `/` location serves ./website (the demo landing page).

server {
    listen 0.0.0.0:8090;
    listen 0.0.0.0:8110;
    server_name localhost;

    client_max_body_size 10M;

    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/5xx.html;

    location / {
        root      ./website;
        index     index.html;
        methods   GET;
        autoindex on;
    }

    location /files {
        root      ./www/files;
        methods   GET;
        autoindex on;
    }

    location /uploads {
        root        ./www/uploads;
        methods     GET POST DELETE;
        upload_dir  ./www/uploads;
        client_max_body_size 50M;
    }

    location /cgi-bin {
        root    ./www/cgi-bin;
        methods GET POST DELETE;
        cgi     .py  /usr/bin/python3;
        cgi     .php  /usr/bin/php-cgi;
    }

    location /old {
        return 301 /files;
    }
}

server {
    listen 0.0.0.0:8110;
    listen 0.0.0.0:8130;
    server_name tchoutchou;

    client_max_body_size 10M;

    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/5xx.html;

    location / {
        root      ./website;
        index     index.html;
        methods   GET;
        autoindex off;
    }

    location /files {
        root      ./www/files;
        methods   GET;
        autoindex on;
    }

    location /uploads {
        root        ./www/uploads;
        methods     GET POST DELETE;
        upload_dir  ./www/uploads;
        client_max_body_size 50M;
    }

    location /cgi-bin {
        root    ./www/cgi-bin;
        methods GET POST;
        cgi     .py  /usr/bin/python3;
    }

    location /old {
        return 301 /files;
    }
}
