# Known-good config used as a sanity control by run_error_tests.sh.
# Uses high, unlikely-to-collide ports so it never fights a real dev
# instance of WebServ for a listening port.
server {
    listen 0.0.0.0:18090;
    server_name control-test;

    location / {
        root ./www;
        index index.html;
        methods GET;
    }
}
