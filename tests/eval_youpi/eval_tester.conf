# eval_tester.conf — config for the official 42 webserv evaluation tester
# Invocation: ./WebServ tests/eval_youpi/eval_tester.conf
# Fixtures live under tests/eval_youpi/ (YoupiBanane tree + cgi_tester binary).

server {
    listen 0.0.0.0:9090;
    server_name localhost;

    client_max_body_size 10M;

    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/5xx.html;

    location / {
        root      ./www;
        index     index.html;
        methods   GET;
        autoindex off;
    }

    location /directory {
        root      ./tests/eval_youpi/YoupiBanane;
        index     youpi.bad_extension;
        methods   GET POST;
        autoindex off;
        cgi       .bla ./tests/eval_youpi/cgi_tester;
        client_max_body_size  200M;
    }

    location /post_body {
        root                  ./tests/eval_youpi/post_body;
        methods               POST;
        client_max_body_size  100;
    }
}
