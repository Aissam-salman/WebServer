<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — No such line</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    background:#e7ddc6;
    background-image:repeating-linear-gradient(0deg,transparent 0 33px,rgba(24,36,32,.035) 33px 34px);
    color:#182420;font:16px/1.6 "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
  .notice{max-width:440px;margin:20px;padding:30px 34px;background:#f1e9d5;
    border:1px solid #d6cbab;border-radius:6px;box-shadow:0 10px 30px -18px rgba(24,36,32,.6);text-align:center}
  .lamp{width:34px;height:34px;border-radius:50%;margin:0 auto 14px;
    background:#e0574a;box-shadow:0 0 18px #e0574a}
  .code{font:800 13px/1 "Helvetica Neue",Arial,sans-serif;text-transform:uppercase;
    letter-spacing:.28em;color:#a53326;margin-bottom:6px}
  h1{font:700 24px/1.25 "Helvetica Neue",Arial,sans-serif;margin:0 0 10px}
  p{color:#6a6350;margin:0 0 20px}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;
    background:#e3d9bd;border-radius:3px;padding:1px 5px}
  a{display:inline-block;text-decoration:none;font:700 13px/1 "Helvetica Neue",Arial,sans-serif;
    letter-spacing:.04em;color:#f1e9d5;background:#182420;padding:10px 16px;border-radius:4px}
  a:hover{background:#0f5a44}
</style>
</head>
<body>
  <div class="notice">
    <div class="lamp"></div>
    <div class="code">404 · No such line</div>
    <h1>This train doesn't stop here.</h1>
    <p>Nothing is served at that path. You're seeing the custom stop signal set by
       <code>error_page 404</code> in the config.</p>
    <a href="/">Back to departures</a>
  </div>
</body>
</html>
